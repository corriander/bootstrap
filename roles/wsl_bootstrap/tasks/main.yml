---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: bootstrap_manage_packages | bool

- name: Install base bootstrap packages
  become: true
  ansible.builtin.apt:
    name: "{{ wsl_bootstrap_packages }}"
    state: present
  when: bootstrap_manage_packages | bool

- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"

- name: Check whether Ubuntu/Debian fdfind binary exists
  ansible.builtin.stat:
    path: /usr/bin/fdfind
  register: bootstrap_fdfind_stat

- name: Check whether fd shim already exists
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.local/bin/fd"
  register: bootstrap_fd_shim_stat

- name: Provide fd shim for Debian-style fdfind packaging
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: "{{ ansible_env.HOME }}/.local/bin/fd"
    state: link
  when:
    - bootstrap_fdfind_stat.stat.exists
    - not bootstrap_fd_shim_stat.stat.exists

- name: Check whether Oh My Zsh is already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh"
  register: bootstrap_oh_my_zsh_stat

- name: Install Oh My Zsh
  ansible.builtin.shell: |
    set -euo pipefail
    RUNZSH=no CHSH=no KEEP_ZSHRC=yes sh -c \
      "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    executable: /bin/bash
  environment:
    RUNZSH: "no"
    CHSH: "no"
    KEEP_ZSHRC: "yes"
  when:
    - install_oh_my_zsh | bool
    - not bootstrap_oh_my_zsh_stat.stat.exists

- name: Ensure vcsh repository directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_bootstrap_vcsh_repo_dir }}"
    state: directory
    mode: "0755"

- name: Ensure vcsh config directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_bootstrap_config_dir }}"
    state: directory
    mode: "0755"

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: "0700"

- name: Fetch GitHub SSH host keys
  ansible.builtin.command:
    argv:
      - ssh-keyscan
      - github.com
  register: bootstrap_github_hostkeys
  changed_when: false
  when: bootstrap_clone_dotfiles_repo | bool

- name: Trust GitHub SSH host keys
  ansible.builtin.known_hosts:
    path: "{{ ansible_env.HOME }}/.ssh/known_hosts"
    name: github.com
    key: "{{ item }}"
    state: present
  loop: "{{ bootstrap_github_hostkeys.stdout_lines }}"
  when:
    - bootstrap_clone_dotfiles_repo | bool
    - bootstrap_github_hostkeys.stdout_lines | length > 0

- name: Check whether dotfiles bootstrap vcsh repo already exists
  ansible.builtin.stat:
    path: "{{ dotfiles_bootstrap_repo_dir }}"
  register: dotfiles_bootstrap_repo_stat

- name: Check whether temporary bootstrap git config exists
  ansible.builtin.stat:
    path: "{{ bootstrap_temp_gitconfig_path }}"
  register: bootstrap_temp_gitconfig_stat

- name: Clone dotfiles bootstrap vcsh repo when missing
  ansible.builtin.command:
    argv:
      - vcsh
      - clone
      - -b
      - "{{ dotfiles_bootstrap_repo_branch }}"
      - "{{ dotfiles_bootstrap_repo_url }}"
      - "{{ dotfiles_bootstrap_repo_name }}"
  environment:
    VCSH_REPO_D: "{{ dotfiles_bootstrap_vcsh_repo_dir }}"
    GIT_CONFIG_GLOBAL: "{{ bootstrap_temp_gitconfig_path }}"
  when:
    - bootstrap_clone_dotfiles_repo | bool
    - not dotfiles_bootstrap_repo_stat.stat.exists
    - bootstrap_temp_gitconfig_stat.stat.exists

- name: Check whether mr bootstrap config is present
  ansible.builtin.stat:
    path: "{{ dotfiles_bootstrap_mrconfig_path }}"
  register: bootstrap_mrconfig_stat

- name: Run mr update after bootstrap repo is present
  ansible.builtin.command:
    argv:
      - mr
      - update
  args:
    chdir: "{{ ansible_env.HOME }}"
  environment:
    GIT_CONFIG_GLOBAL: "{{ bootstrap_temp_gitconfig_path if bootstrap_temp_gitconfig_stat.stat.exists else omit }}"
  when:
    - bootstrap_run_mr_update | bool
    - bootstrap_mrconfig_stat.stat.exists
  register: bootstrap_mr_update_result
  failed_when: false

- name: Show mr update output when attention is needed
  ansible.builtin.debug:
    msg: |
      mr update completed with a non-zero exit code ({{ bootstrap_mr_update_result.rc }}).
      This usually means one or more repos need manual attention before rerunning `mr update`.

      stdout:
      {{ bootstrap_mr_update_result.stdout | default('') }}

      stderr:
      {{ bootstrap_mr_update_result.stderr | default('') }}
  when:
    - bootstrap_run_mr_update | bool
    - bootstrap_mrconfig_stat.stat.exists
    - bootstrap_mr_update_result.rc != 0

- name: Mark bootstrap as incomplete when mr update needs rerun
  ansible.builtin.debug:
    msg: >-
      Bootstrap is incomplete because `mr update` reported one or more repo
      issues. Resolve the reported collisions or checkout failures, then rerun
      `./bootstrap.sh`.
  when:
    - bootstrap_run_mr_update | bool
    - bootstrap_mrconfig_stat.stat.exists
    - bootstrap_mr_update_result.rc != 0

- name: Remove temporary bootstrap git config when requested
  ansible.builtin.file:
    path: "{{ bootstrap_temp_gitconfig_path }}"
    state: absent
  when:
    - bootstrap_cleanup_temp_gitconfig | bool
    - bootstrap_temp_gitconfig_stat.stat.exists

- name: Remove temporary bootstrap SSH key when requested
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ bootstrap_ssh_key_path }}"
    - "{{ bootstrap_ssh_public_key_path }}"
  when: bootstrap_cleanup_temp_key | bool
